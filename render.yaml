# ─────────────────────────────────────────────────────────────────────────────
# Render Deployment — Multimodal Math Mentor
# Deploy at: https://dashboard.render.com → New → Blueprint
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Streamlit Web App (Full App — Primary Deployment) ─────────────────
  - type: web
    name: math-mentor-app
    env: docker
    region: oregon
    plan: starter          # upgrade to standard for production load
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /_stcore/health

    envVars:
      # ── LLM Provider ────────────────────────────────────────────────────
      - key: LLM_PROVIDER
        value: groq              # openai | groq | anthropic | gemini
      - key: LLM_MODEL
        value: llama3-8b-8192    # update per provider

      # ── API Keys (set via Render dashboard → Environment) ────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

      # ── Vision OCR Models ────────────────────────────────────────────────
      - key: OPENAI_VISION_MODEL
        value: gpt-4o
      - key: GROQ_VISION_MODEL
        value: llama-3.2-11b-vision-preview
      - key: ANTHROPIC_VISION_MODEL
        value: claude-3-haiku-20240307
      - key: GEMINI_VISION_MODEL
        value: gemini-1.5-flash

      # ── Gemini Model ─────────────────────────────────────────────────────
      - key: GEMINI_MODEL
        value: gemini-1.5-flash

      # ── Mathpix OCR (optional — cloud math OCR) ───────────────────────────
      - key: MATHPIX_APP_ID
        sync: false
      - key: MATHPIX_APP_KEY
        sync: false

      # ── App Settings ─────────────────────────────────────────────────────
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_SERVER_FILE_WATCHER_TYPE
        value: none

      # ── OCR Engine (cloud mode — avoids downloading heavy local models) ──
      # llm_vision uses the LLM API key already set above (no extra cost)
      - key: OCR_ENGINE
        value: llm_vision

      # ── ASR Engine (cloud Whisper — Groq API, no model download needed) ──
      - key: ASR_ENGINE
        value: groq

      # ── OpenTelemetry (prevents Python 3.13 hang with chromadb) ──────────
      - key: OTEL_SDK_DISABLED
        value: "true"

  # ── 2. FastAPI REST Backend (Optional — API-only service) ────────────────
  - type: web
    name: math-mentor-api
    env: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /health

    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama3-8b-8192
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: "8000"
